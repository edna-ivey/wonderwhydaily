<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1500" role="img" aria-labelledby="title description">
  <title id="title">Wonder Why Daily Milestone 2.0 logo exploration</title>
  <description id="description">Three review-only logo concepts derived directly from the existing orbital category illustrations, shown at favicon and header sizes on dark and light backgrounds.</description>
  <defs>
    <style>
      .display { font-family: Georgia, "Times New Roman", serif; font-weight: 700; }
      .sans { font-family: "Avenir Next", Avenir, "Segoe UI", Arial, sans-serif; }
      .label { font-size: 17px; font-weight: 800; letter-spacing: 2px; }
      .wordmark { font-size: 31px; }
      .daily { font-size: 10px; font-weight: 800; letter-spacing: 5px; }
      .note { font-size: 16px; opacity: .72; }
      .ink-orbit { fill: none; stroke: #17221c; stroke-linecap: round; stroke-linejoin: round; }
      .lime-orbit { fill: none; stroke: #d5f07c; stroke-linecap: round; stroke-linejoin: round; }
      .cream-orbit { fill: none; stroke: #fffaf0; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#17221c" flood-opacity=".12"/>
    </filter>

    <!-- Concept A: one open imperfect orbit, thought still in motion -->
    <g id="mark-a">
      <circle cx="50" cy="50" r="46" fill="#d5f07c"/>
      <path d="M14 59C5 34 27 13 54 16c24 3 39 22 34 42-5 19-25 31-45 27" class="ink-orbit" stroke-width="4.5"/>
      <circle cx="42" cy="85" r="5.5" fill="#17221c"/>
    </g>
    <g id="mark-a-dark">
      <circle cx="50" cy="50" r="46" fill="#213329"/>
      <path d="M14 59C5 34 27 13 54 16c24 3 39 22 34 42-5 19-25 31-45 27" class="lime-orbit" stroke-width="4.5"/>
      <circle cx="42" cy="85" r="5.5" fill="#d5f07c"/>
    </g>

    <!-- Concept B: orbit reveals an implied question gradually -->
    <g id="mark-b">
      <circle cx="50" cy="50" r="46" fill="#d5f07c"/>
      <path d="M12 42c7-24 42-34 65-20 21 13 18 34-4 44-17 8-24 12-23 22" class="ink-orbit" stroke-width="4.5"/>
      <path d="M17 70c17 9 41 10 62 2" class="ink-orbit" stroke-width="2.2" opacity=".55"/>
      <circle cx="50" cy="90" r="4.5" fill="#17221c"/>
    </g>
    <g id="mark-b-dark">
      <circle cx="50" cy="50" r="46" fill="#213329"/>
      <path d="M12 42c7-24 42-34 65-20 21 13 18 34-4 44-17 8-24 12-23 22" class="lime-orbit" stroke-width="4.5"/>
      <path d="M17 70c17 9 41 10 62 2" class="cream-orbit" stroke-width="2.2" opacity=".7"/>
      <circle cx="50" cy="90" r="4.5" fill="#d5f07c"/>
    </g>

    <!-- Concept C: layered organic movement closest to category art -->
    <g id="mark-c">
      <circle cx="50" cy="50" r="46" fill="#d5f07c"/>
      <path d="M8 61c19-35 59-49 84-23" class="ink-orbit" stroke-width="3.8"/>
      <path d="M17 78c27 16 60 6 75-20" class="ink-orbit" stroke-width="2.8"/>
      <path d="M29 13c30 7 48 29 51 56" class="ink-orbit" stroke-width="2" opacity=".42"/>
      <circle cx="8" cy="61" r="5" fill="#17221c"/>
      <path d="m82 25 3 7 7 3-7 3-3 7-3-7-7-3 7-3Z" fill="#17221c"/>
    </g>
    <g id="mark-c-dark">
      <circle cx="50" cy="50" r="46" fill="#213329"/>
      <path d="M8 61c19-35 59-49 84-23" class="lime-orbit" stroke-width="3.8"/>
      <path d="M17 78c27 16 60 6 75-20" class="cream-orbit" stroke-width="2.8"/>
      <path d="M29 13c30 7 48 29 51 56" class="lime-orbit" stroke-width="2" opacity=".42"/>
      <circle cx="8" cy="61" r="5" fill="#d5f07c"/>
      <path d="m82 25 3 7 7 3-7 3-3 7-3-7-7-3 7-3Z" fill="#fffaf0"/>
    </g>
  </defs>

  <rect width="1600" height="1500" fill="#f5f1e7"/>
  <rect width="1600" height="230" fill="#17221c"/>
  <text x="100" y="94" class="display" fill="#fffaf0" font-size="62">Logo exploration · closer to the art</text>
  <text x="100" y="150" class="sans" fill="#fffaf0" font-size="22" opacity=".72">Review only · Directly derived from the current category illustrations · Production logo unchanged</text>

  <text x="100" y="298" class="sans label" fill="#17221c">COMPARISON BOARD</text>
  <text x="100" y="340" class="display" fill="#17221c" font-size="30">Favicon, header, dark background, and light background usage</text>

  <!-- Column A -->
  <g transform="translate(100 390)">
    <rect width="440" height="970" rx="4" fill="#fffaf0" filter="url(#shadow)"/>
    <text x="32" y="50" class="sans label" fill="#17221c">A · THE CURIOUS ORBIT</text>
    <text x="32" y="82" class="sans note" fill="#17221c">A thought still in motion.</text>

    <text x="32" y="138" class="sans label" fill="#17221c">FAVICON</text>
    <rect x="32" y="164" width="84" height="84" rx="17" fill="#17221c"/>
    <use href="#mark-a-dark" x="42" y="174" width="64" height="64"/>
    <rect x="140" y="164" width="84" height="84" rx="17" fill="#f5f1e7" stroke="#17221c" stroke-opacity=".16"/>
    <use href="#mark-a" x="150" y="174" width="64" height="64"/>

    <text x="32" y="308" class="sans label" fill="#17221c">HEADER · LIGHT</text>
    <rect x="32" y="332" width="376" height="132" fill="#f5f1e7"/>
    <use href="#mark-a" x="52" y="354" width="88" height="88"/>
    <text x="154" y="385" class="display wordmark" fill="#17221c">Wonder Why</text>
    <text x="235" y="415" text-anchor="middle" class="sans daily" fill="#17221c">DAILY</text>

    <text x="32" y="524" class="sans label" fill="#17221c">HEADER · DARK</text>
    <rect x="32" y="548" width="376" height="132" fill="#17221c"/>
    <use href="#mark-a-dark" x="52" y="570" width="88" height="88"/>
    <text x="154" y="601" class="display wordmark" fill="#fffaf0">Wonder Why</text>
    <text x="235" y="631" text-anchor="middle" class="sans daily" fill="#fffaf0">DAILY</text>

    <text x="32" y="748" class="sans label" fill="#17221c">BRAND READ</text>
    <text x="32" y="782" class="sans note" fill="#17221c">Quiet, open-ended, and simple.</text>
    <text x="32" y="810" class="sans note" fill="#17221c">The least decorative direction.</text>
  </g>

  <!-- Column B -->
  <g transform="translate(580 390)">
    <rect width="440" height="970" rx="4" fill="#fffaf0" filter="url(#shadow)"/>
    <text x="32" y="50" class="sans label" fill="#17221c">B · THE WONDER MARK</text>
    <text x="32" y="82" class="sans note" fill="#17221c">A question discovered slowly.</text>

    <text x="32" y="138" class="sans label" fill="#17221c">FAVICON</text>
    <rect x="32" y="164" width="84" height="84" rx="17" fill="#17221c"/>
    <use href="#mark-b-dark" x="42" y="174" width="64" height="64"/>
    <rect x="140" y="164" width="84" height="84" rx="17" fill="#f5f1e7" stroke="#17221c" stroke-opacity=".16"/>
    <use href="#mark-b" x="150" y="174" width="64" height="64"/>

    <text x="32" y="308" class="sans label" fill="#17221c">HEADER · LIGHT</text>
    <rect x="32" y="332" width="376" height="132" fill="#f5f1e7"/>
    <use href="#mark-b" x="52" y="354" width="88" height="88"/>
    <text x="154" y="385" class="display wordmark" fill="#17221c">Wonder Why</text>
    <text x="235" y="415" text-anchor="middle" class="sans daily" fill="#17221c">DAILY</text>

    <text x="32" y="524" class="sans label" fill="#17221c">HEADER · DARK</text>
    <rect x="32" y="548" width="376" height="132" fill="#17221c"/>
    <use href="#mark-b-dark" x="52" y="570" width="88" height="88"/>
    <text x="154" y="601" class="display wordmark" fill="#fffaf0">Wonder Why</text>
    <text x="235" y="631" text-anchor="middle" class="sans daily" fill="#fffaf0">DAILY</text>

    <text x="32" y="748" class="sans label" fill="#17221c">BRAND READ</text>
    <text x="32" y="782" class="sans note" fill="#17221c">Mysterious without drawing a literal ?</text>
    <text x="32" y="810" class="sans note" fill="#17221c">The most curiosity-specific direction.</text>
  </g>

  <!-- Column C -->
  <g transform="translate(1060 390)">
    <rect width="440" height="970" rx="4" fill="#fffaf0" filter="url(#shadow)"/>
    <text x="32" y="50" class="sans label" fill="#17221c">C · THE DISCOVERY ORBIT</text>
    <text x="32" y="82" class="sans note" fill="#17221c">Ideas colliding and connecting.</text>

    <text x="32" y="138" class="sans label" fill="#17221c">FAVICON</text>
    <rect x="32" y="164" width="84" height="84" rx="17" fill="#17221c"/>
    <use href="#mark-c-dark" x="42" y="174" width="64" height="64"/>
    <rect x="140" y="164" width="84" height="84" rx="17" fill="#f5f1e7" stroke="#17221c" stroke-opacity=".16"/>
    <use href="#mark-c" x="150" y="174" width="64" height="64"/>

    <text x="32" y="308" class="sans label" fill="#17221c">HEADER · LIGHT</text>
    <rect x="32" y="332" width="376" height="132" fill="#f5f1e7"/>
    <use href="#mark-c" x="52" y="354" width="88" height="88"/>
    <text x="154" y="385" class="display wordmark" fill="#17221c">Wonder Why</text>
    <text x="235" y="415" text-anchor="middle" class="sans daily" fill="#17221c">DAILY</text>

    <text x="32" y="524" class="sans label" fill="#17221c">HEADER · DARK</text>
    <rect x="32" y="548" width="376" height="132" fill="#17221c"/>
    <use href="#mark-c-dark" x="52" y="570" width="88" height="88"/>
    <text x="154" y="601" class="display wordmark" fill="#fffaf0">Wonder Why</text>
    <text x="235" y="631" text-anchor="middle" class="sans daily" fill="#fffaf0">DAILY</text>

    <text x="32" y="748" class="sans label" fill="#17221c">BRAND READ</text>
    <text x="32" y="782" class="sans note" fill="#17221c">Organic, lively, and closest to category art.</text>
    <text x="32" y="810" class="sans note" fill="#17221c">The richest visual connection to the site.</text>
  </g>

  <rect x="100" y="1400" width="1400" height="2" fill="#17221c" opacity=".16"/>
  <text x="100" y="1448" class="sans" fill="#17221c" font-size="17" opacity=".68">All three marks keep the center visually open, avoid intersecting electron ellipses, and use the same imperfect motion found in Wonder Why Daily category artwork.</text>
</svg>
