<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1500" role="img" aria-labelledby="title description">
  <title id="title">Wonder Why Daily Concept C final refinements</title>
  <description id="description">Three review-only refinements of the Discovery Orbit logo concept, shown at favicon sizes, header size, and on dark and light backgrounds.</description>
  <defs>
    <style>
      .display { font-family: Georgia, "Times New Roman", serif; font-weight: 700; }
      .sans { font-family: "Avenir Next", Avenir, "Segoe UI", Arial, sans-serif; }
      .label { font-size: 17px; font-weight: 800; letter-spacing: 2px; }
      .wordmark { font-size: 32px; }
      .daily { font-size: 10px; font-weight: 800; letter-spacing: 5px; }
      .note { font-size: 16px; opacity: .72; }
      .ink-path { fill: none; stroke: #17221c; stroke-linecap: round; stroke-linejoin: round; }
      .lime-path { fill: none; stroke: #a9cf3b; stroke-linecap: round; stroke-linejoin: round; }
      .cream-path { fill: none; stroke: #fffaf0; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#17221c" flood-opacity=".11"/>
    </filter>

    <!-- C1: organic crossings, destination dot attached to an expressive path -->
    <symbol id="c1-light" viewBox="0 0 105 105">
      <path d="M12 67C24 22 75 7 94 31c13 18-7 44-39 55-23 8-39 4-45-5" class="ink-path" stroke-width="5"/>
      <path d="M30 12c-15 13-13 38 3 58 17 21 42 29 58 20" class="lime-path" stroke-width="4"/>
      <path d="M17 78c22 9 45 3 63-10" class="ink-path" stroke-width="2.8" opacity=".72"/>
      <circle cx="92" cy="88" r="6.5" fill="#a9cf3b"/>
    </symbol>
    <symbol id="c1-dark" viewBox="0 0 105 105">
      <path d="M12 67C24 22 75 7 94 31c13 18-7 44-39 55-23 8-39 4-45-5" class="cream-path" stroke-width="5"/>
      <path d="M30 12c-15 13-13 38 3 58 17 21 42 29 58 20" class="lime-path" stroke-width="4"/>
      <path d="M17 78c22 9 45 3 63-10" class="cream-path" stroke-width="2.8" opacity=".68"/>
      <circle cx="92" cy="88" r="6.5" fill="#a9cf3b"/>
    </symbol>

    <!-- C2: the paths unfold toward a point of discovery -->
    <symbol id="c2-light" viewBox="0 0 105 105">
      <path d="M8 70c20-40 65-54 88-27 14 17 1 34-19 44" class="ink-path" stroke-width="5"/>
      <path d="M29 14c-8 19 4 42 25 57 16 11 29 15 40 14" class="lime-path" stroke-width="4.2"/>
      <path d="M16 82c21 10 45 4 65-8" class="ink-path" stroke-width="3"/>
      <circle cx="94" cy="85" r="8" fill="#f5f1e7" stroke="#a9cf3b" stroke-width="4"/>
    </symbol>
    <symbol id="c2-dark" viewBox="0 0 105 105">
      <path d="M8 70c20-40 65-54 88-27 14 17 1 34-19 44" class="cream-path" stroke-width="5"/>
      <path d="M29 14c-8 19 4 42 25 57 16 11 29 15 40 14" class="lime-path" stroke-width="4.2"/>
      <path d="M16 82c21 10 45 4 65-8" class="cream-path" stroke-width="3"/>
      <circle cx="94" cy="85" r="8" fill="#17221c" stroke="#a9cf3b" stroke-width="4"/>
    </symbol>

    <!-- C3: bolder, simplified movement optimized for favicon recognition -->
    <symbol id="c3-light" viewBox="0 0 105 105">
      <path d="M9 68C24 26 72 10 94 34c13 15-1 35-24 48-22 12-46 12-59 2" class="ink-path" stroke-width="6.5"/>
      <path d="M31 12c-12 20 3 48 28 65 14 9 26 12 35 9" class="lime-path" stroke-width="5.5"/>
      <circle cx="94" cy="86" r="7" fill="#a9cf3b"/>
    </symbol>
    <symbol id="c3-dark" viewBox="0 0 105 105">
      <path d="M9 68C24 26 72 10 94 34c13 15-1 35-24 48-22 12-46 12-59 2" class="cream-path" stroke-width="6.5"/>
      <path d="M31 12c-12 20 3 48 28 65 14 9 26 12 35 9" class="lime-path" stroke-width="5.5"/>
      <circle cx="94" cy="86" r="7" fill="#a9cf3b"/>
    </symbol>
  </defs>

  <rect width="1800" height="1500" fill="#f5f1e7"/>
  <rect width="1800" height="220" fill="#17221c"/>
  <text x="110" y="88" class="display" fill="#fffaf0" font-size="60">Concept C · final refinements</text>
  <text x="110" y="142" class="sans" fill="#fffaf0" font-size="22" opacity=".72">Review only · Discovery Orbit refined, not reinvented · Production logo unchanged</text>

  <text x="110" y="285" class="sans label" fill="#17221c">SIDE-BY-SIDE REVIEW</text>
  <text x="110" y="326" class="display" fill="#17221c" font-size="30">Organic motion, discovery-point behavior, and favicon strength</text>

  <!-- C1 -->
  <g transform="translate(110 375)">
    <rect width="500" height="1010" rx="4" fill="#fffaf0" filter="url(#shadow)"/>
    <text x="34" y="48" class="sans label" fill="#17221c">CONCEPT C1 · ORGANIC CONNECTION</text>
    <text x="34" y="80" class="sans note" fill="#17221c">The most expressive, hand-drawn refinement.</text>

    <text x="34" y="132" class="sans label" fill="#17221c">FAVICON STRENGTH</text>
    <rect x="34" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c1-dark" x="61" y="185" width="16" height="16"/>
    <text x="69" y="250" text-anchor="middle" class="sans note" fill="#17221c">16px</text>
    <rect x="128" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c1-dark" x="147" y="177" width="32" height="32"/>
    <text x="163" y="250" text-anchor="middle" class="sans note" fill="#17221c">32px</text>
    <rect x="222" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c1-dark" x="233" y="169" width="48" height="48"/>
    <text x="257" y="250" text-anchor="middle" class="sans note" fill="#17221c">48px</text>

    <text x="34" y="310" class="sans label" fill="#17221c">HEADER · LIGHT</text>
    <rect x="34" y="334" width="432" height="128" fill="#f5f1e7"/>
    <use href="#c1-light" x="55" y="348" width="100" height="100"/>
    <text x="170" y="383" class="display wordmark" fill="#17221c">Wonder Why</text>
    <text x="252" y="415" text-anchor="middle" class="sans daily" fill="#17221c">DAILY</text>

    <text x="34" y="520" class="sans label" fill="#17221c">HEADER · DARK</text>
    <rect x="34" y="544" width="432" height="128" fill="#17221c"/>
    <use href="#c1-dark" x="55" y="558" width="100" height="100"/>
    <text x="170" y="593" class="display wordmark" fill="#fffaf0">Wonder Why</text>
    <text x="252" y="625" text-anchor="middle" class="sans daily" fill="#fffaf0">DAILY</text>

    <text x="34" y="730" class="sans label" fill="#17221c">LIGHT MARK</text>
    <use href="#c1-light" x="34" y="754" width="150" height="150"/>
    <text x="210" y="792" class="sans note" fill="#17221c">Uneven path lengths create</text>
    <text x="210" y="819" class="sans note" fill="#17221c">confident, organic motion.</text>
    <text x="210" y="862" class="sans note" fill="#17221c">The dot becomes the endpoint</text>
    <text x="210" y="889" class="sans note" fill="#17221c">of one unfolding connection.</text>
  </g>

  <!-- C2 -->
  <g transform="translate(650 375)">
    <rect width="500" height="1010" rx="4" fill="#fffaf0" filter="url(#shadow)"/>
    <text x="34" y="48" class="sans label" fill="#17221c">CONCEPT C2 · DISCOVERY POINT</text>
    <text x="34" y="80" class="sans note" fill="#17221c">The clearest destination and payoff.</text>

    <text x="34" y="132" class="sans label" fill="#17221c">FAVICON STRENGTH</text>
    <rect x="34" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c2-dark" x="61" y="185" width="16" height="16"/>
    <text x="69" y="250" text-anchor="middle" class="sans note" fill="#17221c">16px</text>
    <rect x="128" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c2-dark" x="147" y="177" width="32" height="32"/>
    <text x="163" y="250" text-anchor="middle" class="sans note" fill="#17221c">32px</text>
    <rect x="222" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c2-dark" x="233" y="169" width="48" height="48"/>
    <text x="257" y="250" text-anchor="middle" class="sans note" fill="#17221c">48px</text>

    <text x="34" y="310" class="sans label" fill="#17221c">HEADER · LIGHT</text>
    <rect x="34" y="334" width="432" height="128" fill="#f5f1e7"/>
    <use href="#c2-light" x="55" y="348" width="100" height="100"/>
    <text x="170" y="383" class="display wordmark" fill="#17221c">Wonder Why</text>
    <text x="252" y="415" text-anchor="middle" class="sans daily" fill="#17221c">DAILY</text>

    <text x="34" y="520" class="sans label" fill="#17221c">HEADER · DARK</text>
    <rect x="34" y="544" width="432" height="128" fill="#17221c"/>
    <use href="#c2-dark" x="55" y="558" width="100" height="100"/>
    <text x="170" y="593" class="display wordmark" fill="#fffaf0">Wonder Why</text>
    <text x="252" y="625" text-anchor="middle" class="sans daily" fill="#fffaf0">DAILY</text>

    <text x="34" y="730" class="sans label" fill="#17221c">LIGHT MARK</text>
    <use href="#c2-light" x="34" y="754" width="150" height="150"/>
    <text x="210" y="792" class="sans note" fill="#17221c">The open paths gather toward</text>
    <text x="210" y="819" class="sans note" fill="#17221c">a quiet, ringed discovery point.</text>
    <text x="210" y="862" class="sans note" fill="#17221c">Less electron-like, though the ring</text>
    <text x="210" y="889" class="sans note" fill="#17221c">adds one extra tiny-size detail.</text>
  </g>

  <!-- C3 -->
  <g transform="translate(1190 375)">
    <rect width="500" height="1010" rx="4" fill="#fffaf0" filter="url(#shadow)"/>
    <text x="34" y="48" class="sans label" fill="#17221c">CONCEPT C3 · BOLD DISCOVERY</text>
    <text x="34" y="80" class="sans note" fill="#17221c">The strongest favicon and simplest motion.</text>

    <text x="34" y="132" class="sans label" fill="#17221c">FAVICON STRENGTH</text>
    <rect x="34" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c3-dark" x="61" y="185" width="16" height="16"/>
    <text x="69" y="250" text-anchor="middle" class="sans note" fill="#17221c">16px</text>
    <rect x="128" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c3-dark" x="147" y="177" width="32" height="32"/>
    <text x="163" y="250" text-anchor="middle" class="sans note" fill="#17221c">32px</text>
    <rect x="222" y="158" width="70" height="70" rx="14" fill="#17221c"/>
    <use href="#c3-dark" x="233" y="169" width="48" height="48"/>
    <text x="257" y="250" text-anchor="middle" class="sans note" fill="#17221c">48px</text>

    <text x="34" y="310" class="sans label" fill="#17221c">HEADER · LIGHT</text>
    <rect x="34" y="334" width="432" height="128" fill="#f5f1e7"/>
    <use href="#c3-light" x="55" y="348" width="100" height="100"/>
    <text x="170" y="383" class="display wordmark" fill="#17221c">Wonder Why</text>
    <text x="252" y="415" text-anchor="middle" class="sans daily" fill="#17221c">DAILY</text>

    <text x="34" y="520" class="sans label" fill="#17221c">HEADER · DARK</text>
    <rect x="34" y="544" width="432" height="128" fill="#17221c"/>
    <use href="#c3-dark" x="55" y="558" width="100" height="100"/>
    <text x="170" y="593" class="display wordmark" fill="#fffaf0">Wonder Why</text>
    <text x="252" y="625" text-anchor="middle" class="sans daily" fill="#fffaf0">DAILY</text>

    <text x="34" y="730" class="sans label" fill="#17221c">LIGHT MARK</text>
    <use href="#c3-light" x="34" y="754" width="150" height="150"/>
    <text x="210" y="792" class="sans note" fill="#17221c">Two bold, irregular paths retain</text>
    <text x="210" y="819" class="sans note" fill="#17221c">the Discovery Orbit character.</text>
    <text x="210" y="862" class="sans note" fill="#17221c">The integrated endpoint remains</text>
    <text x="210" y="889" class="sans note" fill="#17221c">clear at the smallest sizes.</text>
  </g>

  <rect x="110" y="1435" width="1580" height="2" fill="#17221c" opacity=".16"/>
  <text x="110" y="1472" class="sans" fill="#17221c" font-size="17" opacity=".68">All three are refinements of Concept C only: layered motion, open centers, irregular paths, and a discovery point that belongs to the movement rather than orbiting like an electron.</text>
</svg>
